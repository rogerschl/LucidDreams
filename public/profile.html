<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil | LucidDreams</title>

  <link rel="stylesheet" href="./css/profile.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
</head>

<body>

  <main class="profile-page">

    <header class="topbar">
      <div>
        <p class="welcome">Profil</p>
        <h1>Einstellungen anpassen</h1>
      </div>

      <a href="./dashboard.html" class="ghost-btn">Zurück</a>
    </header>

    <section class="profile-layout">

      <form class="profile-card" id="profileForm">
        <span class="tag">Account</span>
        <h2>Profil bearbeiten</h2>

        <div class="input-group">
          <label for="nameInput">Name</label>
          <input type="text" id="nameInput" placeholder="Dein Name">
        </div>

        <div class="input-group">
          <label for="emailInput">E-Mail</label>
          <input type="email" id="emailInput" placeholder="deine@email.de">
        </div>

        <div class="input-group">
          <label for="passwordInput">Neues Passwort</label>
          <input type="password" id="passwordInput" placeholder="Neues Passwort">
        </div>

        <button type="submit" class="save-btn">
          Profil speichern
        </button>

        <button type="button" class="logout-btn" id="logoutBtn">
          Abmelden
        </button>

        
      </form>
      

      <form class="profile-card" id="goalsForm">
        <span class="tag">Ziele</span>
        <h2>Tagesziele festlegen</h2>

        <div class="input-group">
          <label for="realityGoalInput">Reality Checks pro Tag</label>
          <input type="number" id="realityGoalInput" min="1" max="30" placeholder="z. B. 8">
        </div>

        <div class="input-group">
          <label for="dreamGoalInput">Traumeinträge pro Woche</label>
          <input type="number" id="dreamGoalInput" min="1" max="14" placeholder="z. B. 5">
        </div>

        <div class="input-group">
          <label for="personalGoalInput">Persönliches Ziel</label>
          <textarea id="personalGoalInput" placeholder="z. B. Ich möchte meinen ersten luziden Traum erleben."></textarea>
        </div>

        <button type="submit" class="save-btn">
          Ziele speichern
        </button>
      </form>

    </section>

    <p class="save-message" id="saveMessage"></p>

  </main>

 

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./js/supabase-client.js"></script>
 <script src="./js/profile.js"></script>
</body>
</html>
