<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrieren | LucidDreams</title>

  <link rel="stylesheet" href="./css/stylesheet.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
</head>

<body>

  <main class="register-page">

    <a href="./index.html" class="register-logo">LucidDreams</a>

    <a href="./index.html" class="back-link">Zurück</a>

    <section class="register-wrapper">
      <div class="auth-glow"></div>

      <form class="auth-card register-card" id="registerForm">
        <span class="section-tag">Starte deine Reise</span>

        <h2>Registrieren</h2>

        <p class="auth-subtitle">
          Erstelle deinen Account und beginne mit deinem Traumtagebuch.
        </p>

        <div class="input-group">
          <label for="name">Name</label>
          <input 
            type="text" 
            id="name" 
            placeholder="Dein Name" 
            required
          >
        </div>

        <div class="input-group">
          <label for="email">E-Mail</label>
          <input 
            type="email" 
            id="email" 
            placeholder="deine@email.de" 
            required
          >
        </div>

        <div class="input-group">
          <label for="password">Passwort</label>
          <input 
            type="password" 
            id="password" 
            placeholder="Mindestens 6 Zeichen" 
            required
            minlength="6"
          >
        </div>

        <button type="submit" class="auth-button">
          Account erstellen
        </button>

        <p class="auth-switch">
          Bereits einen Account?
          <a href="./login.html">Anmelden</a>
        </p>
      </form>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/supabase-client.js"></script>
  <script src="./js/register.js"></script>
</body>
</html>
