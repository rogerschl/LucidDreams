<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passwort vergessen | LucidDreams</title>

  <link rel="stylesheet" href="./css/stylesheet.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <main class="reset-password">
        <a href="./index.html" class="register-logo">LucidDreams</a>
    
        <a href="./index.html" class="back-link">Zurück</a>
    
        <section class="forgot-password-wrapper">
            <div class="auth-glow"></div>
    
            <form class="auth-card reset-card" id="resetForm">
            <span class="section-tag">Passwort zurücksetzen</span>
    
            <h2>Passwort zurücksetzen</h2>
    
            <p class="auth-subtitle">
                Gib dein neues Passwort ein und bestätige es.
            </p>
    
            <div class="input-group">
                <label for="password">Neues Passwort</label>
                <input 
                type="password" 
                id="password" 
                placeholder="Neues Passwort" 
                required
            >
            </div>

            <div class="input-group">
                <label for="confirmPassword">Passwort bestätigen</label>
                <input 
                type="password" 
                id="confirmPassword" 
                placeholder="Passwort bestätigen" 
                required
            >
            </div>

            <button type="submit" class="cta">Passwort zurücksetzen</button>
            <p class="auth-subtitle" id="resetMessage"></p>
        </form>
    </section>
</main>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./js/supabase-client.js"></script>
<script src="./js/reset-password.js"></script>

</body>
</html>
