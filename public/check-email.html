<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Mail bestätigen | LucidDreams</title>
  <link rel="manifest" href="./manifest.webmanifest">

<link rel="icon" type="image/png" sizes="192x192" href="./img/icon-192.png">
<link rel="apple-touch-icon" href="./img/icon-192.png">

<meta name="theme-color" content="#020610">
<meta name="background-color" content="#020610">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">

  <link rel="stylesheet" href="./css/stylesheet.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
</head>

<body>

  <main class="login-page">

    <a href="./index.html" class="register-logo">LucidDreams</a>

    <a href="./login.html" class="back-link">Zum Login</a>

    <section class="login-wrapper">
      <div class="auth-glow"></div>

      <div class="auth-card login-card">
        <span class="section-tag">Fast geschafft</span>

        <h2>E-Mail bestätigen</h2>

        <p class="auth-subtitle">
          Wir haben dir einen Bestätigungslink gesendet. Bitte prüfe dein Postfach.
        </p>

        <p class="auth-subtitle" id="pendingEmailText"></p>

        <p class="resend-message" id="resendMessage"></p>

        <button type="button" class="auth-button" id="resendEmailBtn">
          E-Mail erneut senden
        </button>

        <p class="auth-switch">
          Bereits bestätigt?
          <a href="./login.html">Zum Login</a>
        </p>
      </div>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/supabase-client.js"></script>
  <script src="./js/pwa-register.js"></script>
  <script src="./js/check-email.js"></script>
</body>
</html>
