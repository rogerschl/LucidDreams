<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>E-Mail bestätigen | LucidDreams</title>
        <link rel="stylesheet" href="./css/stylesheet.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">


    </head>
    <body>
        <main class ="register-page">
            <a href="./index.html" class="register-logo"> LucidDreams</a>
            <section class="check-email-wrapper">
                <div class="auth-glow"></div>
                <div class="auth-card check-email-card">

                    <span class="section-tag">
                        Fast geschafft!
                    </section-tag></span>

                    <h2> E-Mail bestätigen</h2>

                    <div class="email-icon">
                        ✉
                    </div>

                    <p class="auth-subtitles">
                        Wir haben dir eine bestätigung E-Mail geschickt.
                        Öffne dein Postfach und klicke auf den Link, um deinen Account zu aktivieren
                    </p>

                    <button class="resend-btn" id="resendBtn" type="button">
                        E-Mail erneut senden
                    </button>

                    <p class="side-font">
                        Falsche E-Mail angegeben? Keine Proble hier gehts zurück zur <a href="./register.html" class="register-link-button">Registrierung.</a>
                    </p>

                </div>
            </section>

        </main>
        
        
    </body>
    <script src="./js/check-email.js"></script>
</html>
