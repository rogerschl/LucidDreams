<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kurs | LucidDreams</title>

  <style>
  body.auth-loading {
    visibility: hidden;
  }
</style>

  <link rel="stylesheet" href="./css/course.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
</head>

<body class="auth-loading"></body>

  <main class="course-page">

    <header class="topbar">
      <div>
        <p class="welcome">LucidDreams Kurs</p>
        <h1>Lerne luzides Träumen Schritt für Schritt</h1>
      </div>

      <a href="./dashboard.html" class="ghost-btn">Dashboard</a>
    </header>

    <section class="course-layout">

      <aside class="course-sidebar">
        <div class="sidebar-header">
          <h2>Kurs</h2>
          <p id="courseProgressText">0 / 0 erledigt</p>

          <div class="progress-bar">
            <div class="progress-fill" id="courseProgressFill"></div>
          </div>
        </div>

        <div class="course-select-box">
          <label for="courseSelect">Kurs auswählen</label>
          <select id="courseSelect">
            <option value="">Kurs wird geladen...</option>
          </select>
        </div>

        <nav class="lesson-nav" id="lessonNav">
          <p class="empty-state">Noch keine Lektionen geladen.</p>
        </nav>
      </aside>

      <article class="lesson-card">

        <div class="lesson-top">
          <span class="tag" id="lessonTag">Lektion</span>
          <span class="status-pill" id="lessonStatus">Nicht erledigt</span>
        </div>

        <h2 id="lessonTitle">Noch keine Lektion ausgewählt</h2>

        <div class="lesson-content" id="lessonContent">
          <p>
            Erstelle im Adminbereich zuerst einen Kurs, Module und Lektionen.
            Danach erscheinen sie hier automatisch.
          </p>
        </div>

        <div class="lesson-actions">
          <button type="button" class="secondary-btn" id="prevLessonBtn">
            Vorherige Lektion
          </button>

          <button type="button" class="primary-btn" id="completeLessonBtn">
            Als erledigt markieren
          </button>

          <button type="button" class="secondary-btn" id="nextLessonBtn">
            Nächste Lektion
          </button>
        </div>

      </article>

    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/supabase-client.js"></script>
  <script src="./js/auth-guard.js"></script>
  <script src="./js/course.js"></script>
</body>
</html>
