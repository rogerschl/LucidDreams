<!DOCTYPE html>
<html lang="de">
<head>
  <link rel="manifest" href="./manifest.webmanifest">

<link rel="icon" type="image/png" sizes="192x192" href="./img/icon-192.png">
<link rel="apple-touch-icon" href="./img/icon-192.png">

<meta name="theme-color" content="#020610">
<meta name="background-color" content="#020610">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passwort vergessen | LucidDreams</title>

  <link rel="stylesheet" href="./css/stylesheet.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
</head>

<body>

  <main class="forgot-password-page">

    <a href="./index.html" class="register-logo">
      LucidDreams
    </a>

    <a href="./login.html" class="back-link">
      Zurück
    </a>

    <section class="forgot-password-wrapper">
      <div class="auth-glow"></div>

      <form class="auth-card forgot-card" id="forgotPasswordForm">
        <span class="section-tag">Passwort zurücksetzen</span>

        <h2>Passwort vergessen?</h2>

        <p class="auth-subtitle">
          Gib deine E-Mail-Adresse ein, um Anweisungen zum Zurücksetzen deines Passworts zu erhalten.
        </p>

        <div class="input-group">
          <label for="resetEmail">E-Mail</label>
          <input 
            type="email" 
            id="resetEmail" 
            placeholder="deine@email.de" 
            required
          >
        </div>

        <button class="auth-button" type="submit">
          Anfrage abschicken
        </button>

        <p class="auth-subtitle reset-message" id="resetMessage"></p>
      </form>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/supabase-client.js"></script>
  <script src="./js/forgot-password.js"></script>
</body>
</html>
