<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anmelden | LucidDreams</title>

  <link rel="stylesheet" href="./css/stylesheet.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
</head>

<body>

  <main class="login-page">

    <a href="./index.html" class="register-logo">LucidDreams</a>

    <a href="./index.html" class="back-link">Zurück</a>

    <section class="login-wrapper">
      <div class="auth-glow"></div>

      <form class="auth-card login-card">
        <span class="section-tag">Willkommen zurück</span>

        <h2>Anmelden</h2>

        <p class="auth-subtitle">
          Melde dich an und führe dein Traumtagebuch weiter.
        </p>

        <div class="input-group">
          <label for="email">E-Mail</label>
          <input type="email" id="email" placeholder="deine@email.de">
        </div>

        <div class="input-group">
          <label for="password">Passwort</label>
          <input type="password" id="password" placeholder="Dein Passwort">
        </div>

        <div class="login-options">
          <label class="small-checkbox">
            <input type="checkbox">
            <span>Eingeloggt bleiben</span>
          </label>

          <a href="#" class="forgot-link">Passwort vergessen?</a>
        </div>

        <button type="submit" class="auth-button">
          Einloggen
          <span>→</span>
        </button>

        <p class="auth-switch">
          Noch keinen Account?
          <a href="./register.html">Registrieren</a>
        </p>
      </form>
    </section>

  </main>

</body>
</html>
